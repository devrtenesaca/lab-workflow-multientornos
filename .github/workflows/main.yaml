name: Main Orchestrator

on:
  push:
    branches: [ master, dev ]

jobs:
  deploy-dev:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      env-name: 'dev'
    secrets:
      env-secret: ${{ secrets.ENV_MESSAGE }}

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      env-name: 'prod'
    secrets:
      env-secret: ${{ secrets.ENV_MESSAGE }}